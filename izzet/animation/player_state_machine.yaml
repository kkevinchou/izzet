initial: airborne

states:
  idle:
    clip: Idle_Loop
    playRate: 1
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSights
        when: [grounded, aimDownSights]
      - to: sprintEnter
        when: [moving]
      - to: idle
        when: [clipCompleted, grounded]
      - to: airborne
        when: [airborne]

  airborne:
    clip: Jump_Loop
    playRate: 1.5
    transitions:
      - to: jumpLand
        when: [grounded]
      - to: airborne
        when: [clipCompleted]

  jumpStart:
    clip: Jump_Start
    playRate: 2
    transitions:
      - to: airborne
        when: [clipCompleted, airborne]
      - to: jumpLand
        when: [grounded]

  jumpLand:
    clip: Jump_Land
    playRate: 1.5
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSights
        when: [grounded, aimDownSights]
      - to: sprintEnter
        when: [grounded, moving]
      - to: idle
        when: [grounded, clipCompleted]

  aimDownSights:
    clip: Pistol_Aim_Neutral
    playRate: 1
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSightsFire
        when: [grounded, aimDownSights, aimDownSightsFire]
      - to: airborne
        when: [airborne]
      - to: sprintEnter
        when: [grounded, moving, notAimDownSights]
      - to: idle
        when: [grounded, stationary, notAimDownSights]
      - to: aimDownSights
        when: [grounded, aimDownSights, clipCompleted]

  aimDownSightsFire:
    clip: Pistol_Shoot
    playRate: 1
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSightsFire
        when: [grounded, aimDownSights, aimDownSightsFire]
      - to: aimDownSights
        when: [clipCompleted, grounded, aimDownSights]
      - to: sprintEnter
        when: [grounded, moving, notAimDownSights]
      - to: idle
        when: [grounded, stationary, notAimDownSights]
      - to: airborne
        when: [airborne]

  sprint:
    clip: Sprint_Loop
    playRate: 1
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSights
        when: [grounded, aimDownSights]
      - to: sprintExit
        when: [stationary]
      - to: sprint
        when: [moving, grounded, clipCompleted]
      - to: idle
        when: [stationary, grounded]
      - to: airborne
        when: [airborne]

  sprintEnter:
    clip: Sprint_Enter
    playRate: 1.5
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSights
        when: [grounded, aimDownSights]
      - to: idle
        when: [stationary, grounded]
      - to: sprint
        when: [moving, clipCompleted]
      - to: airborne
        when: [airborne]

  sprintExit:
    clip: Sprint_Exit
    playRate: 2
    transitions:
      - to: jumpStart
        when: [jumpTriggered]
      - to: aimDownSights
        when: [grounded, aimDownSights]
      - to: sprintEnter
        when: [moving, grounded]
      - to: idle
        when: [stationary, grounded, clipCompleted]
