initial: airborne

states:
  idle:
    clip: Velociraptor_Idle
    playRate: 1
    transitions:
      - to: death
        when: [dead]
      - to: attack
        when: [attacking]
      - to: airborne
        when: [airborne]
      - to: run
        when: [moving]
      - to: idle
        when: [clipCompleted, grounded]

  run:
    clip: Velociraptor_Run
    playRate: 1
    transitions:
      - to: death
        when: [dead]
      - to: attack
        when: [attacking]
      - to: airborne
        when: [airborne]
      - to: idle
        when: [stationary, grounded]
      - to: run
        when: [moving, grounded, clipCompleted]

  airborne:
    clip: Velociraptor_Jump
    playRate: 1
    transitions:
      - to: death
        when: [dead]
      - to: run
        when: [grounded, moving]
      - to: idle
        when: [grounded, stationary]
      - to: airborne
        when: [clipCompleted]

  attack:
    clip: Velociraptor_Attack
    playRate: 1
    transitions:
      - to: death
        when: [dead]
      - to: attack
        when: [attacking, clipCompleted]
      - to: airborne
        when: [clipCompleted, airborne]
      - to: run
        when: [clipCompleted, grounded, moving]
      - to: idle
        when: [clipCompleted, grounded, stationary]

  death:
    clip: Velociraptor_Death
    playRate: 1
